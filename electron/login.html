<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本能中医处方系统 - 登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            background: linear-gradient(180deg, #e0f4ff 0%, #c8e1f5 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-container {
            width: 247px;
            height: 300px;
            background: linear-gradient(180deg, #e0f4ff 0%, #c8e1f5 100%);
            border-radius: 8px;
            box-shadow: 0 6px 20px rgba(0, 102, 204, 0.3);
            overflow: hidden;
            position: relative;
            border: 2px solid #4a90d9;
        }
        
        .bg-decoration {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 247 300"><defs><pattern id="circles" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse"><circle cx="10" cy="10" r="1.5" fill="rgba(74, 144, 217, 0.12)"/></pattern></defs><rect fill="url(%23circles)" width="247" height="300"/></svg>');
            background-size: cover;
        }
        
        .header-section {
            position: relative;
            z-index: 1;
            padding: 13px 17px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            background: linear-gradient(180deg, #4a90d9 0%, #357abd 100%);
            border-bottom: 1.5px solid #2962a3;
        }
        
        .system-title {
            font-size: 15px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.4);
            letter-spacing: 1.5px;
        }
        
        .version-tag {
            font-size: 10px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
        }
        
        .main-content {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            height: calc(100% - 52px);
            padding: 20px 13px;
        }
        
        .login-box {
            background: rgba(255,255,255,0.95);
            border-radius: 7px;
            padding: 17px 23px 20px;
            width: 100%;
            max-width: 187px;
            box-shadow: 0 3px 10px rgba(74, 144, 217, 0.3);
            border: 1.5px solid #7ab8f5;
        }
        
        .login-field {
            margin-bottom: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .login-field label {
            width: 33px;
            font-size: 10px;
            font-weight: bold;
            color: #333;
            text-align: left;
            white-space: nowrap;
            line-height: 1.2;
        }
        
        .login-field select {
            flex: 1;
            padding: 4px 5px;
            border: 1.5px solid #4a90d9;
            border-radius: 4px;
            font-size: 9px;
            background: white;
            min-width: 64px;
            max-width: 68px;
        }
        
        .login-field input {
            flex: 1;
            padding: 4px 5px;
            border: 1.5px solid #4a90d9;
            border-radius: 4px;
            font-size: 9px;
            background: white;
            min-width: 64px;
            max-width: 68px;
        }
        
        .login-field select:focus, .login-field input:focus {
            border-color: #2962a3;
            outline: none;
            box-shadow: 0 0 5px rgba(74, 144, 217, 0.5);
        }
        
        .login-buttons {
            display: flex;
            gap: 13px;
            justify-content: center;
            margin-top: 17px;
        }
        
        .login-btn {
            padding: 5px 15px;
            min-width: 53px;
            background: linear-gradient(180deg, #6cb3f0 0%, #4a90d9 100%);
            color: #fff;
            border: 1.5px solid #357abd;
            border-radius: 4px;
            font-size: 9px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 1.5px 2px 4px rgba(0, 82, 152, 0.35);
            transition: all 0.2s;
        }
        
        .login-btn:hover {
            background: linear-gradient(180deg, #8dc8f7 0%, #6cb3f0 100%);
            transform: translateY(-0.5px);
        }
        
        .login-footer {
            text-align: center;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #ddd;
            font-size: 8px;
            color: #666;
        }
        
        .login-error {
            color: #dc2626;
            font-size: 7px;
            text-align: center;
            margin-top: 7px;
            padding: 4px;
            background: #fff5f5;
            border-radius: 2px;
            border: 1px solid #fcc;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="bg-decoration"></div>
        
        <div class="header-section">
            <span class="system-title">本能中医处方系统</span>
            <span class="version-tag">【云版】</span>
        </div>
        
        <div class="main-content">
            <div class="login-box">
                <div class="login-field" id="usernameField">
                    <label>用户：</label>
                    <select id="loginUsername"></select>
                    <input type="text" id="loginUsernameInput" style="display:none;" placeholder="输入用户名">
                </div>
                
                <div class="login-field">
                    <label>密码：</label>
                    <input type="password" id="loginPassword" placeholder="">
                </div>
                
                <div class="login-buttons">
                    <button class="login-btn" onclick="handleLogin()">确定</button>
                    <button class="login-btn" onclick="handleCancel()">取消</button>
                </div>
                
                <div id="loginError" class="login-error"></div>
                
                <div class="login-footer">微信号: yqjz1688</div>
            </div>
        </div>
    </div>
    
    <script>
        const { ipcRenderer } = require('electron');
        
        const defaultUsers = [
            { username: 'admin', password: 'admin', name: '管理员', role: 'admin' },
            { username: 'doctor1', password: '123456', name: '张医生', role: 'user' },
            { username: 'doctor2', password: '123456', name: '李医生', role: 'user' },
            { username: 'wangguijie', password: '123456', name: '王桂杰', role: 'user' },
            { username: 'wangyaoxie', password: '123456', name: '王耀燮', role: 'user' }
        ];
        
        async function getUsers() {
            try {
                const savedUsers = localStorage.getItem('tcmUsers');
                if (savedUsers) {
                    const users = JSON.parse(savedUsers);
                    if (Array.isArray(users) && users.length > 0) {
                        return users;
                    }
                }
            } catch (e) {
                console.log('读取用户数据失败:', e);
            }
            return defaultUsers;
        }
        
        // 检测是否有管理员用户
        function hasAdminUser(users) {
            return users.some(u => u.role === 'admin');
        }
        
        async function initLoginDropdown() {
            const users = await getUsers();
            const select = document.getElementById('loginUsername');
            const input = document.getElementById('loginUsernameInput');
            
            if (hasAdminUser(users)) {
                // 有管理员，显示下拉框
                select.style.display = 'block';
                input.style.display = 'none';
                select.innerHTML = '';
                users.forEach(user => {
                    const option = document.createElement('option');
                    option.value = user.username;
                    option.textContent = user.username;
                    select.appendChild(option);
                });
            } else {
                // 无管理员（全部是普通用户），显示输入框
                select.style.display = 'none';
                input.style.display = 'block';
                // 如果有记住的用户名，显示出来
                const savedUser = localStorage.getItem('lastUsername');
                if (savedUser) {
                    input.value = savedUser;
                }
            }
        }
        
        async function handleLogin() {
            const select = document.getElementById('loginUsername');
            const input = document.getElementById('loginUsernameInput');
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            
            // 获取用户名（下拉框或输入框）
            const username = select.style.display !== 'none' ? select.value : input.value.trim();
            
            if (!username) {
                errorDiv.textContent = '请输入用户名';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (!password) {
                errorDiv.textContent = '请输入密码';
                errorDiv.style.display = 'block';
                return;
            }
            
            const users = await getUsers();
            const user = users.find(u => u.username === username && u.password === password);
            
            if (user) {
                // 记住用户名
                localStorage.setItem('lastUsername', username);
                localStorage.setItem('currentUser', JSON.stringify(user));
                sessionStorage.setItem('currentUser', JSON.stringify(user));
                ipcRenderer.invoke('login-success', user);
            } else {
                errorDiv.textContent = '密码错误';
                errorDiv.style.display = 'block';
            }
        }
        
        function handleCancel() {
            ipcRenderer.invoke('login-cancel');
        }
        
        // 回车键登录
        document.addEventListener('DOMContentLoaded', async () => {
            await initLoginDropdown();
            document.getElementById('loginPassword').addEventListener('keyup', (e) => {
                if (e.key === 'Enter') {
                    handleLogin();
                }
            });
        });
    </script>
</body>
</html>
