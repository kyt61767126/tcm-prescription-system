<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本能中医处方系统 - 云端版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        .title {
            font-size: 24px;
            color: #333;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #28a745;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
        }
        .btn-login:active {
            transform: translateY(0);
        }
        .links {
            margin-top: 20px;
            font-size: 14px;
        }
        .links a {
            color: #667eea;
            text-decoration: none;
            margin: 0 10px;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }
        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🏥</div>
        <h1 class="title">本能中医处方系统</h1>
        <p class="subtitle">[云端版]</p>
        
        <div id="error-message" class="error-message"></div>
        <div id="success-message" class="success-message"></div>
        
        <form id="login-form">
            <div class="form-group">
                <label for="username">用户名:</label>
                <input type="text" id="username" name="username" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label for="password">密码:</label>
                <input type="password" id="password" name="password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn-login">登录</button>
        </form>
        
        <div class="links">
            <a href="#" id="register-link">注册</a>
            <span>|</span>
            <a href="#" id="forgot-link">忘记密码</a>
        </div>
    </div>

    <script>
        const USERS_KEY = 'tcm_users';
        const CURRENT_USER_KEY = 'tcm_current_user';

        function getUsers() {
            try {
                const usersStr = localStorage.getItem(USERS_KEY);
                return usersStr ? JSON.parse(usersStr) : [];
            } catch {
                return [];
            }
        }

        function saveUsers(users) {
            localStorage.setItem(USERS_KEY, JSON.stringify(users));
        }

        function showError(message) {
            document.getElementById('error-message').textContent = message;
            document.getElementById('error-message').style.display = 'block';
            document.getElementById('success-message').style.display = 'none';
        }

        function showSuccess(message) {
            document.getElementById('success-message').textContent = message;
            document.getElementById('success-message').style.display = 'block';
            document.getElementById('error-message').style.display = 'none';
        }

        function hideMessages() {
            document.getElementById('error-message').style.display = 'none';
            document.getElementById('success-message').style.display = 'none';
        }

        function initDefaultUsers() {
            const users = getUsers();
            if (users.length === 0) {
                const defaultUsers = [
                    { username: 'admin', password: 'admin', name: '管理员', role: 'admin' },
                    { username: 'doctor1', password: '123456', name: '王医生', role: 'user' },
                    { username: 'doctor2', password: '123456', name: '李医生', role: 'user' }
                ];
                saveUsers(defaultUsers);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            initDefaultUsers();
            
            document.getElementById('login-form').addEventListener('submit', (e) => {
                e.preventDefault();
                hideMessages();
                
                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;
                
                const users = getUsers();
                const user = users.find(u => u.username === username && u.password === password);
                
                if (user) {
                    localStorage.setItem(CURRENT_USER_KEY, JSON.stringify(user));
                    showSuccess('登录成功！正在跳转...');
                    setTimeout(() => {
                        window.location.href = 'main.html';
                    }, 1500);
                } else {
                    showError('用户名或密码错误');
                }
            });
            
            document.getElementById('register-link').addEventListener('click', (e) => {
                e.preventDefault();
                const username = prompt('请输入新用户名:');
                const password = prompt('请输入新密码:');
                
                if (username && password) {
                    const users = getUsers();
                    if (users.find(u => u.username === username)) {
                        alert('用户名已存在');
                    } else {
                        users.push({ username, password, name: username, role: 'user' });
                        saveUsers(users);
                        alert('注册成功！请登录');
                    }
                }
            });
            
            document.getElementById('forgot-link').addEventListener('click', (e) => {
                e.preventDefault();
                alert('请联系管理员重置密码');
            });
        });
    </script>
</body>
</html>
