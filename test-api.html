<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>API测试</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .result { margin: 20px 0; padding: 10px; border: 1px solid #ccc; }
        .success { background: #e8f5e9; border-color: #4caf50; }
        .error { background: #ffebee; border-color: #f44336; }
    </style>
</head>
<body>
    <h1>云端 API 测试</h1>
    <button onclick="testPrescriptions()">测试处方 API</button>
    <button onclick="testUsers()">测试用户 API</button>
    <div id="result" class="result"></div>
    
    <script>
        async function testPrescriptions() {
            const url = 'https://tcm-prescription-system.pages.dev/api/prescriptions?user=admin';
            const resultDiv = document.getElementById('result');
            
            try {
                resultDiv.innerHTML = '正在请求...';
                resultDiv.className = 'result';
                
                const response = await fetch(url);
                console.log('响应状态:', response.status);
                
                const text = await response.text();
                console.log('响应文本:', text);
                
                try {
                    const data = JSON.parse(text);
                    resultDiv.innerHTML = `
                        <h3>请求成功!</h3>
                        <p>状态码: ${response.status}</p>
                        <p>数据类型: ${Array.isArray(data) ? '数组' : '对象'}</p>
                        <p>数据长度: ${Array.isArray(data) ? data.length : 'N/A'}</p>
                        <p>数据内容:</p>
                        <pre>${JSON.stringify(data, null, 2).substring(0, 2000)}</pre>
                    `;
                    resultDiv.className = 'result success';
                } catch (e) {
                    resultDiv.innerHTML = `
                        <h3>JSON解析失败</h3>
                        <p>错误: ${e.message}</p>
                        <p>响应文本:</p>
                        <pre>${text}</pre>
                    `;
                    resultDiv.className = 'result error';
                }
            } catch (e) {
                resultDiv.innerHTML = `
                    <h3>请求失败</h3>
                    <p>错误: ${e.message}</p>
                `;
                resultDiv.className = 'result error';
            }
        }
        
        async function testUsers() {
            const url = 'https://tcm-prescription-system.pages.dev/api/users';
            const resultDiv = document.getElementById('result');
            
            try {
                resultDiv.innerHTML = '正在请求...';
                resultDiv.className = 'result';
                
                const response = await fetch(url);
                const text = await response.text();
                const data = JSON.parse(text);
                
                resultDiv.innerHTML = `
                    <h3>用户 API 测试</h3>
                    <p>状态码: ${response.status}</p>
                    <p>用户数量: ${data.length}</p>
                    <pre>${JSON.stringify(data, null, 2).substring(0, 1000)}</pre>
                `;
                resultDiv.className = 'result success';
            } catch (e) {
                resultDiv.innerHTML = `
                    <h3>请求失败</h3>
                    <p>错误: ${e.message}</p>
                `;
                resultDiv.className = 'result error';
            }
        }
    </script>
</body>
</html>
