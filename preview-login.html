<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本能中医处方系统 - 登录预览</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-box {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px 35px;
            width: 380px;
            position: relative;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-title {
            font-size: 26px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }
        
        .version-tag {
            color: #667eea;
            font-size: 14px;
            font-weight: 600;
        }
        
        .login-field {
            margin-bottom: 20px;
        }
        
        .login-field label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
        }
        
        .login-field select,
        .login-field input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e1e1e1;
            border-radius: 8px;
            font-size: 15px;
            background: #fafafa;
            transition: all 0.3s;
        }
        
        .login-field select:focus,
        .login-field input:focus {
            border-color: #667eea;
            outline: none;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        
        .login-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 25px;
        }
        
        .login-btn {
            flex: 1;
            padding: 14px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }
        
        .login-btn.cancel {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
        }
        
        .login-btn.cancel:hover {
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.5);
        }
        
        .login-error {
            color: #f5576c;
            font-size: 14px;
            margin-top: 15px;
            text-align: center;
            display: none;
            padding: 12px;
            background: #fff5f5;
            border-radius: 6px;
            border: 1px solid #fcc;
        }
        
        .login-footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #999;
        }
        
        .preview-note {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="login-header">
            <div class="login-title">🏥 本能中医处方系统</div>
            <div class="version-tag">【云版】</div>
        </div>
        
        <div class="login-field">
            <label>用户名：</label>
            <select id="loginUsername">
                <option>管理员</option>
                <option>张医生</option>
                <option>李医生</option>
                <option>王桂杰</option>
                <option>王耀燮</option>
            </select>
        </div>
        
        <div class="login-field">
            <label>密码：</label>
            <input type="password" id="loginPassword" placeholder="请输入密码">
        </div>
        
        <div class="login-buttons">
            <button class="login-btn">登录</button>
            <button class="login-btn cancel">取消</button>
        </div>
        
        <div id="loginError" class="login-error"></div>
        
        <div class="login-footer">
            <div>微信电话: 18566243358</div>
        </div>
    </div>
    
    <div class="preview-note">
        📋 预览效果：420x480 精致小窗口，完美适配桌面！
    </div>
    
    <script>
        // 预览脚本，仅展示效果
        document.querySelectorAll('.login-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                alert('预览模式，此按钮仅展示效果！');
            });
        });
    </script>
</body>
</html>
