<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>初始化管理员账号</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif;
      max-width: 500px;
      margin: 50px auto;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #555;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }
    input:focus {
      border-color: #667eea;
      outline: none;
    }
    button {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover {
      opacity: 0.9;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .message {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      display: none;
    }
    .success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 初始化管理员账号</h1>
    
    <div class="form-group">
      <label>用户名</label>
      <input type="text" id="username" value="admin">
    </div>
    
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="password" value="admin">
    </div>
    
    <div class="form-group">
      <label>姓名</label>
      <input type="text" id="name" value="管理员">
    </div>
    
    <button id="initBtn" onclick="initAdmin()">初始化管理员</button>
    
    <div id="message" class="message"></div>
  </div>

  <script>
    async function initAdmin() {
      const btn = document.getElementById('initBtn');
      const message = document.getElementById('message');
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const name = document.getElementById('name').value;

      btn.disabled = true;
      btn.textContent = '初始化中...';
      message.style.display = 'none';

      try {
        const response = await fetch('/api/auth/init-admin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, name })
        });

        const result = await response.json();

        if (response.ok) {
          message.className = 'message success';
          message.textContent = '✅ ' + result.message;
          message.style.display = 'block';
          
          setTimeout(() => {
            window.location.href = '/';
          }, 2000);
        } else {
          message.className = 'message error';
          message.textContent = '❌ ' + (result.error || result.message || '初始化失败');
          message.style.display = 'block';
        }
      } catch (error) {
        message.className = 'message error';
        message.textContent = '❌ 网络错误：' + error.message;
        message.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = '初始化管理员';
      }
    }
  </script>
</body>
</html>
