<!DOCTYPE html>
<html>
<head>
    <title>云端同步测试</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .btn { padding: 10px 20px; margin: 10px; cursor: pointer; }
        .result { margin-top: 20px; padding: 10px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <h1>云端同步测试工具</h1>
    
    <button class="btn" onclick="testLogin()">1. 测试登录</button>
    <button class="btn" onclick="testUpload()">2. 测试上传处方</button>
    <button class="btn" onclick="testDownload()">3. 测试下载处方</button>
    <button class="btn" onclick="testSync()">4. 测试完整同步</button>
    
    <div class="result" id="result"></div>

    <script>
        async function testLogin() {
            const result = document.getElementById('result');
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: 'admin', password: 'admin' })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('jwtToken', data.token);
                    result.innerHTML = '✅ 登录成功！Token: ' + data.token.slice(0, 20) + '...';
                } else {
                    result.innerHTML = '❌ 登录失败: ' + response.status;
                }
            } catch (error) {
                result.innerHTML = '❌ 错误: ' + error.message;
            }
        }
        
        async function testUpload() {
            const result = document.getElementById('result');
            const token = localStorage.getItem('jwtToken');
            
            if (!token) {
                result.innerHTML = '⚠️ 请先登录';
                return;
            }
            
            try {
                const record = {
                    id: Date.now(),
                    prescriptionNo: 'TEST' + Date.now(),
                    patientName: '测试患者',
                    patientGender: '男',
                    patientAge: '30',
                    date: new Date().toISOString().split('T')[0],
                    items: [{name: '测试药', dosage: 10, unit: 'g'}],
                    createdAt: Date.now(),
                    updatedAt: Date.now()
                };
                
                const response = await fetch('/api/prescriptions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify(record)
                });
                
                if (response.ok) {
                    result.innerHTML = '✅ 处方上传成功！';
                } else {
                    result.innerHTML = '❌ 上传失败: ' + response.status;
                }
            } catch (error) {
                result.innerHTML = '❌ 错误: ' + error.message;
            }
        }
        
        async function testDownload() {
            const result = document.getElementById('result');
            const token = localStorage.getItem('jwtToken');
            
            if (!token) {
                result.innerHTML = '⚠️ 请先登录';
                return;
            }
            
            try {
                const response = await fetch('/api/prescriptions', {
                    method: 'GET',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    result.innerHTML = '✅ 下载成功！云端处方数量: ' + (data.prescriptions?.length || 0);
                    console.log('处方列表:', data.prescriptions);
                } else {
                    result.innerHTML = '❌ 下载失败: ' + response.status;
                }
            } catch (error) {
                result.innerHTML = '❌ 错误: ' + error.message;
            }
        }
        
        async function testSync() {
            await testLogin();
            await testUpload();
            await testDownload();
        }
    </script>
</body>
</html>
